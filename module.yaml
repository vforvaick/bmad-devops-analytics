name: bda
code: bda
version: 1.4.0-alpha
description: BMAD DevOps Analytics (BDA) - Production lifecycle extension - deploy, verify, monitor, learn, refine
author: vforvaick
repository: https://github.com/vforvaick/bmad-devops-analytics

agents:
  - name: devops
    file: agents/devops.yaml
    description: Deployment, infrastructure, and rollback orchestration
    
  - name: sre
    file: agents/sre.yaml
    description: Observability setup, monitoring, and incident analysis
    
  - name: analytics
    file: agents/analytics.yaml
    description: Product usage analysis and feature adoption tracking

workflows:
  - name: bmad-bda-pipeline-story
    path: workflows/bmad-bda-pipeline-story
    description: Deliver one user story autonomously in an isolated git worktree
    agents: [dev]

  - name: bmad-bda-pipeline-epic
    path: workflows/bmad-bda-pipeline-epic
    description: End-to-end autonomous delivery of an entire Epic using isolated git worktrees
    agents: [pm, dev]

  - name: bmad-bda-observability-setup
    path: workflows/bmad-bda-observability-setup
    description: Monitoring stack configuration (one-time per environment)
    agents: [sre, devops]

  - name: bmad-bda-release-readiness
    path: workflows/bmad-bda-release-readiness
    description: Pre-deploy validation gate
    agents: [architect, test-architect, devops]
    
  - name: bmad-bda-deploy
    path: workflows/bmad-bda-deploy
    description: Structured deployment execution
    agents: [devops]

  - name: bmad-bda-deployment-verification
    path: workflows/bmad-bda-deployment-verification
    description: Immediate post-deploy proof of critical runtime outcomes
    agents: [devops, sre]
    
  - name: bmad-bda-post-launch-review
    path: workflows/bmad-bda-post-launch-review
    description: Evidence synthesis and insights generation (24-72h post-deploy)
    agents: [pm, analyst, sre, analytics]
    
  - name: bmad-bda-spec-refinement
    path: workflows/bmad-bda-spec-refinement
    description: Translate production insights to PRD/epic updates with optional correct-course handoff
    agents: [pm, analyst]

templates:
  - release-readiness.md
  - release-intent-matrix.md
  - deployment-baseline.md
  - deployment-plan.md
  - deployment-log.md
  - deployment-verification.md
  - operational-decision-record.md
  - rollback-plan.md
  - observability-config.md
  - observability-report.md
  - usage-insights.md
  - post-launch-insights.md
  - production-vs-plan-matrix.md
  - prd-change-draft.md
  - architecture-change-draft.md
  - spec-refinement-log.md
  - bmad-follow-up.md

adapters:
  - name: vps-default
    path: adapters/vps-default
    description: Full-stack observability for VPS with root access
    
  - name: vercel
    path: adapters/vercel
    description: Logs, errors, and analytics via Vercel APIs
    
  - name: shared-hosting
    path: adapters/shared-hosting
    description: Lightweight monitoring for shared hosting environments

dependencies:
  bmad-method: ">=6.0.0"

outputDirectory: _bmad-output/production-artifacts

metadata:
  phase: 5
  category: production
  maturity: alpha
  governance: human-in-the-loop
